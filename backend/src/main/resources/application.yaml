spring:
  application:
    name: backend

  app:
    jwt:
      secret: ${SECRET_KEY}
      expiration-ms: 86400000

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

langchain4j:
  open-ai:
    api-key: ${GITHUB_KEY}
    base-url: https://api.openai.com/v1
    chat-model:
      model-name: gpt-4o
      temperature: 0.7
    embedding-model:
      model-name: text-embedding-3-small

ai:
  pgvector:
    host: ep-wandering-bar-a1moigem-pooler.ap-southeast-1.aws.neon.tech
    port: 5432
    database: ai_service
    table: embeddings
    dimension: 1536

aws:
  s3:
    bucket-name: infrastrack
    region: us-east-1
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}

server:
  port: 8081